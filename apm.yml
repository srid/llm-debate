name: llm-debate
version: 0.1.0
description: Structured debates between AI agents across Kolu terminals
type: hybrid
targets:
  - claude
  - codex
  - opencode

# AGENTS.md / CLAUDE.md are generated by `apm compile`, not source inputs.
compilation:
  exclude:
    - AGENTS.md
    - "**/AGENTS.md"
    - CLAUDE.md
    - "**/CLAUDE.md"
    - node_modules/**
    - "**/node_modules/**"

# The debate skill drives the other agent via kolu's kaval-tui — depend on the
# kolu skill alone, not the whole kolu package.
dependencies:
  apm:
    - juspay/kolu/.apm/skills/kolu
