<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 770" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#3a4656"/>
    </marker>
  </defs>

  <!-- background (explicit, so it reads in light & dark themes) -->
  <rect x="0" y="0" width="960" height="770" fill="#f6f7f9"/>

  <!-- title -->
  <text x="480" y="40" text-anchor="middle" font-size="26" font-weight="700" fill="#19212e">Loop Deck — a decommitment assistant</text>
  <text x="480" y="66" text-anchor="middle" font-size="14" font-style="italic" fill="#46525f">Open-loop anxiety resolved by structured contact with reality — not by holding more</text>

  <!-- ===== INTAKE ROW ===== -->
  <g font-size="13" fill="#19212e">
    <!-- Capture -->
    <rect x="30" y="92" width="270" height="80" rx="10" fill="#e9eff7" stroke="#33567f" stroke-width="1.5"/>
    <text x="46" y="116" font-size="15" font-weight="700">1 · CAPTURE</text>
    <text x="46" y="136" font-size="11.5" fill="#3a4656">Raw dump (voice / text), zero friction.</text>
    <text x="46" y="153" font-size="11.5" fill="#3a4656">Promise: "not lost" — not yet trusted.</text>

    <!-- Clarify -->
    <rect x="345" y="92" width="270" height="80" rx="10" fill="#e9eff7" stroke="#33567f" stroke-width="1.5"/>
    <text x="361" y="116" font-size="15" font-weight="700">2 · CLARIFY</text>
    <text x="361" y="136" font-size="11.5" fill="#3a4656">LLM drafts a loop contract.</text>
    <text x="361" y="153" font-size="11.5" fill="#3a4656">You ratify / veto — never author.</text>

    <!-- Budget gate -->
    <rect x="660" y="92" width="270" height="80" rx="10" fill="#fdecea" stroke="#b4452f" stroke-width="1.5"/>
    <text x="676" y="116" font-size="15" font-weight="700">3 · BUDGET GATE</text>
    <text x="676" y="136" font-size="11.5" fill="#3a4656">At capacity? Choose what LEAVES:</text>
    <text x="676" y="153" font-size="11.5" fill="#3a4656">swap · defer · drop · renegotiate. (slow on purpose)</text>

    <line x1="300" y1="132" x2="343" y2="132" stroke="#3a4656" stroke-width="1.6" marker-end="url(#arrow)"/>
    <line x1="615" y1="132" x2="658" y2="132" stroke="#3a4656" stroke-width="1.6" marker-end="url(#arrow)"/>
  </g>

  <line x1="480" y1="172" x2="480" y2="206" stroke="#3a4656" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- ===== LIVE DECK ===== -->
  <rect x="30" y="210" width="900" height="232" rx="12" fill="#fff8e6" stroke="#caa53a" stroke-width="1.6"/>
  <text x="480" y="234" text-anchor="middle" font-size="14" font-weight="700" fill="#7a5e12">THE LIVE DECK — everything here counts against your commitment budget (WIP-limited)</text>

  <!-- state cards -->
  <g>
    <!-- Active / Parked -->
    <rect x="46" y="250" width="206" height="176" rx="8" fill="#ffffff" stroke="#d8dee6"/>
    <rect x="46" y="250" width="6" height="176" rx="3" fill="#2f7a52"/>
    <text x="62" y="274" font-size="14" font-weight="700" fill="#19212e">Active / Parked</text>
    <text x="62" y="298" font-size="11" fill="#3a4656">"I intend to move this."</text>
    <text x="62" y="320" font-size="11" fill="#3a4656">outcome · next contact</text>
    <text x="62" y="336" font-size="11" fill="#3a4656">with reality · EVIDENCE-DUE</text>
    <text x="62" y="360" font-size="11" fill="#9a3b2a">no movement by horizon</text>
    <text x="62" y="376" font-size="11" fill="#9a3b2a">→ escalate, don't soothe</text>

    <!-- Waiting -->
    <rect x="264" y="250" width="206" height="176" rx="8" fill="#ffffff" stroke="#d8dee6"/>
    <rect x="264" y="250" width="6" height="176" rx="3" fill="#6a5aa0"/>
    <text x="280" y="274" font-size="14" font-weight="700" fill="#19212e">Waiting</text>
    <text x="280" y="298" font-size="11" fill="#3a4656">someone / something else</text>
    <text x="280" y="314" font-size="11" fill="#3a4656">owns the next move</text>
    <text x="280" y="338" font-size="11" fill="#3a4656">watch condition</text>
    <text x="280" y="354" font-size="11" fill="#3a4656">+ nudge / drop rule</text>
    <text x="280" y="378" font-size="11" font-style="italic" fill="#6a5aa0">"not yours to act on yet"</text>

    <!-- Held / Incubating -->
    <rect x="482" y="250" width="206" height="176" rx="8" fill="#ffffff" stroke="#d8dee6"/>
    <rect x="482" y="250" width="6" height="176" rx="3" fill="#b5862e"/>
    <text x="498" y="274" font-size="14" font-weight="700" fill="#19212e">Held / Incubating</text>
    <rect x="628" y="259" width="52" height="14" rx="7" fill="#b5862e"/>
    <text x="654" y="269" text-anchor="middle" font-size="9" font-weight="700" fill="#ffffff">SCARCE</text>
    <text x="498" y="298" font-size="11" fill="#3a4656">keep the question alive,</text>
    <text x="498" y="314" font-size="11" fill="#3a4656">on purpose</text>
    <text x="498" y="338" font-size="11" fill="#3a4656">seed · container ·</text>
    <text x="498" y="354" font-size="11" fill="#3a4656">release condition</text>
    <text x="498" y="378" font-size="11" font-weight="700" fill="#8a6418">CONTACT horizon</text>
    <text x="498" y="394" font-size="11" fill="#3a4656">(honest incubation, not done)</text>
    <text x="498" y="414" font-size="10.5" font-style="italic" fill="#9a7a2a">sparse, not cozy</text>

    <!-- Someday -->
    <rect x="700" y="250" width="214" height="176" rx="8" fill="#ffffff" stroke="#d8dee6"/>
    <rect x="700" y="250" width="6" height="176" rx="3" fill="#8a909b"/>
    <text x="716" y="274" font-size="14" font-weight="700" fill="#19212e">Someday</text>
    <text x="716" y="298" font-size="11" fill="#3a4656">not carrying this now</text>
    <text x="716" y="322" font-size="11" fill="#3a4656">low-frequency review</text>
    <text x="716" y="338" font-size="11" fill="#3a4656">or search-only archive</text>
    <text x="716" y="362" font-size="11" font-style="italic" fill="#6b7280">OUTSIDE live attention</text>
    <text x="716" y="386" font-size="11" font-style="italic" fill="#6b7280">(≠ Held, which is inside)</text>
  </g>

  <line x1="480" y1="442" x2="480" y2="476" stroke="#3a4656" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- ===== EXIT ===== -->
  <rect x="30" y="480" width="900" height="118" rx="12" fill="#e7f5ec" stroke="#2f8f5b" stroke-width="1.8"/>
  <text x="480" y="506" text-anchor="middle" font-size="15" font-weight="700" fill="#1d6b41">EXIT — load LEAVES the deck   ✓ the only family that earns celebration</text>
  <g font-size="13" font-weight="700" fill="#1d6b41">
    <rect x="92" y="520" width="170" height="34" rx="17" fill="#ffffff" stroke="#2f8f5b" stroke-width="1.4"/>
    <text x="177" y="542" text-anchor="middle">Closed (w/ evidence)</text>
    <rect x="286" y="520" width="140" height="34" rx="17" fill="#ffffff" stroke="#2f8f5b" stroke-width="1.4"/>
    <text x="356" y="542" text-anchor="middle">Dropped</text>
    <rect x="450" y="520" width="160" height="34" rx="17" fill="#ffffff" stroke="#2f8f5b" stroke-width="1.4"/>
    <text x="530" y="542" text-anchor="middle">Renegotiated</text>
    <rect x="634" y="520" width="234" height="34" rx="17" fill="#ffffff" stroke="#2f8f5b" stroke-width="1.4"/>
    <text x="751" y="542" text-anchor="middle">Delegated (receipt + watch)</text>
  </g>
  <text x="480" y="582" text-anchor="middle" font-size="11.5" font-style="italic" fill="#2c6b48">Drop feels identical to Close — both reduce load. Fun = the derivative: "load 18 → 11", nothing to defend tomorrow.</text>

  <!-- ===== STANDING RULES ===== -->
  <rect x="30" y="612" width="900" height="138" rx="12" fill="#eef1f5" stroke="#c2cad6" stroke-width="1.4"/>
  <text x="48" y="636" font-size="14" font-weight="700" fill="#19212e">Standing rules</text>
  <g font-size="11.5" fill="#34404e">
    <text x="48" y="660">• No reward for parking or holding — only for load <tspan font-weight="700">leaving</tspan>.</text>
    <text x="48" y="682">• Calm <tspan font-weight="700">mirror</tspan>, drafter's hands: never coaches, nags, or moralizes.</text>
    <text x="48" y="704">• Daily ritual ≤ 3 min, one-tap ratify / veto.</text>
    <text x="48" y="726">• Capacity conflicts: deliberately slow — the one ethical friction.</text>

    <text x="496" y="660">• Trust ledger declares its blind spots; never claims "nothing escaped".</text>
    <text x="496" y="682">• Local-first; designed to be abandoned &amp; resumed without shame.</text>
    <text x="496" y="704">• Bootstrap trust: shadow → reconcile → co-own → graduate, per source.</text>
    <text x="496" y="726">• Relief is a lagging indicator — the north star is loops <tspan font-weight="700">closed</tspan>.</text>
  </g>
</svg>
