<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 590" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5a5a6b"/>
    </marker>
  </defs>

  <!-- card background (light, dark text: legible on both GitHub themes) -->
  <rect x="0" y="0" width="900" height="590" rx="14" fill="#fcfcfd" stroke="#e2e2ea" stroke-width="1.5"/>

  <!-- title -->
  <text x="32" y="36" font-size="20" font-weight="700" fill="#1a1a2e">Sensuous (not affective) enjoyment — the actualist account</text>
  <text x="32" y="57" font-size="12" fill="#6b6b7b">round 3 · every claim sourced to actualfreedom.com.au</text>

  <!-- ============ Panel 1: the fact/tone cut ============ -->
  <text x="32" y="92" font-size="15" font-weight="700" fill="#2a2a3e">1 · The fact / tone cut — where sensuous enjoyment lives</text>

  <!-- timeline -->
  <rect x="40" y="108" width="200" height="50" rx="8" fill="#eef2f7" stroke="#9aa3b0"/>
  <text x="140" y="130" font-size="12.5" text-anchor="middle" fill="#23304a">a raw sense-fact</text>
  <text x="140" y="147" font-size="12.5" text-anchor="middle" fill="#23304a">(the sensum)</text>

  <line x1="240" y1="133" x2="416" y2="133" stroke="#5a5a6b" stroke-width="1.6" marker-end="url(#arrow)"/>

  <rect x="420" y="108" width="220" height="50" rx="8" fill="#fbeeed" stroke="#d8453f"/>
  <text x="530" y="130" font-size="12.5" text-anchor="middle" fill="#7a241f">the &#8216;self&#8217; adds</text>
  <text x="530" y="147" font-size="12.5" text-anchor="middle" fill="#7a241f">a feeling-tone</text>

  <!-- the cut -->
  <line x1="332" y1="100" x2="332" y2="168" stroke="#d8453f" stroke-width="2" stroke-dasharray="5 4"/>
  <text x="332" y="184" font-size="11" font-weight="700" text-anchor="middle" fill="#d8453f">the cut</text>

  <text x="450" y="206" font-size="11.5" font-style="italic" text-anchor="middle" fill="#555">&#8216;&#8230;a fleeting instant of pure perception of sensum, just before one affectively identifies&#8230;&#8217;</text>

  <!-- zone cards -->
  <rect x="40" y="220" width="395" height="98" rx="9" fill="#eaf7ee" stroke="#2e9e5b" stroke-width="1.5"/>
  <text x="58" y="244" font-size="13.5" font-weight="700" fill="#1f7a44">SENSATE — keep &#10003;</text>
  <text x="58" y="268" font-size="12.5" fill="#21402e">&#8216;red, hard-edged against grey&#8217;</text>
  <text x="58" y="285" font-size="12.5" fill="#21402e">— a fact, with no felt owner</text>
  <text x="58" y="306" font-size="11.5" font-style="italic" fill="#2e7d4f">&#8216;the retinas revel&#8230;&#8217; · sensate (&#8216;anhedonic&#8217;) delight</text>

  <rect x="465" y="220" width="395" height="98" rx="9" fill="#fdecec" stroke="#d8453f" stroke-width="1.5"/>
  <text x="483" y="244" font-size="13.5" font-weight="700" fill="#b5302b">AFFECTIVE — drop &#10007;</text>
  <text x="483" y="268" font-size="12.5" fill="#5a201d">&#8216;gorgeous&#8217; · &#8216;it feels good&#8217;</text>
  <text x="483" y="285" font-size="12.5" fill="#5a201d">a felt charge &#8216;in the body&#8217;</text>
  <text x="483" y="306" font-size="11.5" font-style="italic" fill="#c0473f">the tone the &#8216;self&#8217; adds on top</text>

  <!-- divider -->
  <line x1="32" y1="342" x2="868" y2="342" stroke="#e6e6ee" stroke-width="1.5"/>

  <!-- ============ Panel 2: the self-consuming ladder ============ -->
  <text x="32" y="366" font-size="15" font-weight="700" fill="#2a2a3e">2 · The method — a self-consuming ladder (affective means, affect-free end)</text>

  <!-- means -->
  <rect x="40" y="384" width="255" height="162" rx="9" fill="#eaf0fb" stroke="#3b6fd4" stroke-width="1.5"/>
  <text x="58" y="408" font-size="13.5" font-weight="700" fill="#2a55b0">Affective MEANS</text>
  <text x="58" y="426" font-size="11" font-style="italic" fill="#5a6b8c">(used, then burned away)</text>
  <text x="58" y="450" font-size="12" fill="#1f2b45">• feel good / felicity&#8211;innocuity</text>
  <text x="58" y="472" font-size="12" fill="#1f2b45">• &#8216;affective energy channelled</text>
  <text x="70" y="488" font-size="12" fill="#1f2b45">into being happy and harmless&#8217;</text>
  <text x="58" y="512" font-size="12" fill="#1f2b45">• pure intent: PCE-derived,</text>
  <text x="70" y="528" font-size="12" fill="#1f2b45">yet a felt &#8216;life-force&#8217;</text>

  <line x1="295" y1="462" x2="331" y2="462" stroke="#5a5a6b" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- self-immolation -->
  <rect x="335" y="410" width="205" height="104" rx="9" fill="#fdf3e3" stroke="#d9892b" stroke-width="1.5"/>
  <text x="437" y="438" font-size="13" font-weight="700" text-anchor="middle" fill="#b06a17">self-immolation</text>
  <text x="437" y="462" font-size="11.5" text-anchor="middle" fill="#5c4a2a">the affective &#8216;self&#8217; ends</text>
  <text x="437" y="484" font-size="11" font-style="italic" text-anchor="middle" fill="#8a6a3a">&#8216;I&#8217; am &#8216;my&#8217; feelings</text>

  <line x1="540" y1="462" x2="576" y2="462" stroke="#5a5a6b" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- affect-free end -->
  <rect x="580" y="392" width="280" height="154" rx="9" fill="#e6f6f5" stroke="#1f9e95" stroke-width="1.5"/>
  <text x="598" y="416" font-size="13.5" font-weight="700" fill="#16786f">Affect-FREE end</text>
  <text x="598" y="440" font-size="12" fill="#15403c">actual freedom =</text>
  <text x="598" y="456" font-size="12" fill="#15403c">&#8216;a physical condition&#8217;</text>
  <text x="598" y="480" font-size="12" fill="#15403c">the affective pleasure/pain centre</text>
  <text x="598" y="496" font-size="12" fill="#15403c">is &#8216;null and void&#8217; —</text>
  <text x="598" y="520" font-size="11.5" font-style="italic" fill="#178a80">yet sensate delight continues</text>

  <!-- footer: R2 -->
  <text x="32" y="572" font-size="11" font-style="italic" fill="#6b6b7b">R2 — checked, not believed: the test is the PCE — &#8216;it is the PCE which is a person&#8217;s lodestone &#8230; not me and/or my words.&#8217;</text>
</svg>
